<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <!-- background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="50%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#faf0ff"/>
    </linearGradient>
    <!-- soft glow -->
    <radialGradient id="glow1" cx="70%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#c7d7ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0f4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#ffd6f5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#faf0ff" stop-opacity="0"/>
    </radialGradient>
    <!-- character shadow -->
    <radialGradient id="shadow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#c4b5f4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c4b5f4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="drop" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <ellipse cx="840" cy="270" rx="480" ry="340" fill="url(#glow1)"/>
  <ellipse cx="1020" cy="420" rx="320" ry="220" fill="url(#glow2)"/>

  <!-- soft grid dots (decorative) -->
  <g opacity="0.12">
    <circle cx="720" cy="80" r="2.5" fill="#a78bfa"/>
    <circle cx="760" cy="80" r="2.5" fill="#a78bfa"/>
    <circle cx="800" cy="80" r="2.5" fill="#a78bfa"/>
    <circle cx="840" cy="80" r="2.5" fill="#a78bfa"/>
    <circle cx="880" cy="80" r="2.5" fill="#a78bfa"/>
    <circle cx="920" cy="80" r="2.5" fill="#a78bfa"/>
    <circle cx="960" cy="80" r="2.5" fill="#a78bfa"/>
    <circle cx="720" cy="120" r="2.5" fill="#a78bfa"/>
    <circle cx="760" cy="120" r="2.5" fill="#a78bfa"/>
    <circle cx="800" cy="120" r="2.5" fill="#a78bfa"/>
    <circle cx="840" cy="120" r="2.5" fill="#a78bfa"/>
    <circle cx="880" cy="120" r="2.5" fill="#a78bfa"/>
    <circle cx="920" cy="120" r="2.5" fill="#a78bfa"/>
    <circle cx="960" cy="120" r="2.5" fill="#a78bfa"/>
    <circle cx="720" cy="160" r="2.5" fill="#a78bfa"/>
    <circle cx="760" cy="160" r="2.5" fill="#a78bfa"/>
    <circle cx="800" cy="160" r="2.5" fill="#a78bfa"/>
    <circle cx="840" cy="160" r="2.5" fill="#a78bfa"/>
    <circle cx="880" cy="160" r="2.5" fill="#a78bfa"/>
    <circle cx="920" cy="160" r="2.5" fill="#a78bfa"/>
    <circle cx="960" cy="160" r="2.5" fill="#a78bfa"/>
  </g>

  <!-- ── FLOATING ICONS ── -->

  <!-- floating: laptop (top right) -->
  <g filter="url(#drop)" transform="translate(980,90) rotate(-8)">
    <rect x="0" y="10" width="80" height="52" rx="7" fill="#dbeafe" stroke="#93c5fd" stroke-width="2"/>
    <rect x="6" y="16" width="68" height="40" rx="4" fill="#bfdbfe"/>
    <!-- screen content -->
    <rect x="12" y="22" width="30" height="4" rx="2" fill="#60a5fa"/>
    <rect x="12" y="30" width="20" height="3" rx="1.5" fill="#93c5fd"/>
    <rect x="12" y="36" width="25" height="3" rx="1.5" fill="#93c5fd"/>
    <!-- keyboard base -->
    <rect x="-6" y="62" width="92" height="8" rx="4" fill="#93c5fd" stroke="#60a5fa" stroke-width="1.5"/>
    <!-- trackpad -->
    <rect x="28" y="65" width="24" height="4" rx="2" fill="#60a5fa"/>
  </g>

  <!-- floating: code brackets (left side) -->
  <g filter="url(#drop)" transform="translate(660,150) rotate(6)">
    <rect x="0" y="0" width="72" height="56" rx="14" fill="#fce7f3" stroke="#f9a8d4" stroke-width="2"/>
    <text x="36" y="37" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#ec4899">&lt;/&gt;</text>
  </g>

  <!-- floating: robot emoji badge (top) -->
  <g filter="url(#drop)" transform="translate(880,60)">
    <rect x="0" y="0" width="56" height="56" rx="16" fill="#ede9fe" stroke="#c4b5f4" stroke-width="2"/>
    <text x="28" y="40" text-anchor="middle" font-size="28">🤖</text>
  </g>

  <!-- floating: star sparkle (various) -->
  <g fill="#fbbf24" opacity="0.85">
    <polygon points="730,200 733,210 743,210 735,216 738,226 730,220 722,226 725,216 717,210 727,210" transform="scale(0.7) translate(330,110)"/>
    <polygon points="1050,150 1052,157 1059,157 1054,161 1056,168 1050,164 1044,168 1046,161 1041,157 1048,157" transform="scale(0.8)"/>
    <polygon points="670,440 672,447 679,447 674,451 676,458 670,454 664,458 666,451 661,447 668,447" transform="scale(0.65)"/>
  </g>

  <!-- floating: terminal window (bottom right) -->
  <g filter="url(#drop)" transform="translate(1050,360) rotate(5)">
    <rect x="0" y="0" width="110" height="70" rx="10" fill="#1e1b4b" stroke="#4338ca" stroke-width="1.5"/>
    <rect x="0" y="0" width="110" height="18" rx="10" fill="#312e81"/>
    <rect x="0" y="9" width="110" height="9" fill="#312e81"/>
    <circle cx="10" cy="9" r="3.5" fill="#f87171"/>
    <circle cx="22" cy="9" r="3.5" fill="#fbbf24"/>
    <circle cx="34" cy="9" r="3.5" fill="#4ade80"/>
    <text x="10" y="34" font-family="monospace" font-size="9" fill="#4ade80">$ claude code</text>
    <text x="10" y="46" font-family="monospace" font-size="9" fill="#a78bfa">  running...</text>
    <text x="10" y="58" font-family="monospace" font-size="9" fill="#94a3b8">✓ done in 2.1s</text>
  </g>

  <!-- floating: heart (small) -->
  <g transform="translate(1110,200)">
    <path d="M12,6 C12,3.5 10,2 8,2 C6,2 4,3.5 4,6 C4,8 6,10 8,12 C10,10 12,8 12,6Z M8,2 C10,0.5 14,2 14,6 C14,9 10,12 8,14 C6,12 2,9 2,6 C2,2 6,0.5 8,2Z" fill="#fb7185" stroke="none" transform="scale(2.2)"/>
  </g>

  <!-- floating: small cloud -->
  <g transform="translate(690,380)" opacity="0.7">
    <ellipse cx="30" cy="25" rx="30" ry="18" fill="#e0f2fe"/>
    <ellipse cx="50" cy="20" rx="22" ry="16" fill="#e0f2fe"/>
    <ellipse cx="14" cy="28" rx="16" ry="12" fill="#e0f2fe"/>
  </g>

  <!-- ── CHIBI CHARACTER ── -->
  <!-- character shadow -->
  <ellipse cx="830" cy="530" rx="90" ry="18" fill="url(#shadow)" filter="url(#soft)"/>

  <!-- body / torso -->
  <g filter="url(#drop)">
    <!-- hoodie body -->
    <path d="M755,350 Q740,370 738,420 Q736,460 740,510 Q780,525 830,525 Q880,525 920,510 Q924,460 922,420 Q920,370 905,350 Q880,335 830,330 Q780,335 755,350Z" fill="#c4b5f4" stroke="#a78bfa" stroke-width="2"/>
    <!-- hoodie pocket -->
    <rect x="800" y="430" width="60" height="35" rx="12" fill="#a78bfa" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- hoodie strings -->
    <line x1="810" y1="355" x2="800" y2="390" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="850" y1="355" x2="860" y2="390" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round"/>
    <!-- left arm -->
    <path d="M755,355 Q720,370 710,400 Q705,425 718,440 Q730,452 745,440 Q755,420 760,400Z" fill="#c4b5f4" stroke="#a78bfa" stroke-width="2"/>
    <!-- left hand holding coffee cup -->
    <ellipse cx="715" cy="445" rx="18" ry="18" fill="#fde68a" stroke="#fbbf24" stroke-width="2"/>
    <!-- coffee cup -->
    <rect x="703" y="430" width="24" height="28" rx="4" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
    <path d="M727,436 Q737,436 737,444 Q737,452 727,452" fill="none" stroke="#fb923c" stroke-width="2" stroke-linecap="round"/>
    <rect x="705" y="428" width="20" height="5" rx="2.5" fill="#fb923c"/>
    <text x="715" y="447" text-anchor="middle" font-size="8" fill="#fb923c">☕</text>
    <!-- right arm -->
    <path d="M905,355 Q940,370 950,400 Q955,425 942,440 Q930,452 915,440 Q905,420 900,400Z" fill="#c4b5f4" stroke="#a78bfa" stroke-width="2"/>
    <!-- right hand (waving) -->
    <ellipse cx="945" cy="445" rx="18" ry="18" fill="#fde68a" stroke="#fbbf24" stroke-width="2"/>
    <line x1="945" y1="430" x2="942" y2="420" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="952" y1="428" x2="952" y2="418" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="958" y1="432" x2="960" y2="422" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
    <!-- legs -->
    <rect x="785" y="510" width="35" height="40" rx="14" fill="#818cf8" stroke="#6366f1" stroke-width="2"/>
    <rect x="840" y="510" width="35" height="40" rx="14" fill="#818cf8" stroke="#6366f1" stroke-width="2"/>
    <!-- shoes -->
    <ellipse cx="802" cy="550" rx="22" ry="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1.5"/>
    <ellipse cx="857" cy="550" rx="22" ry="10" fill="#1e1b4b" stroke="#312e81" stroke-width="1.5"/>
  </g>

  <!-- HEAD -->
  <g filter="url(#drop)">
    <!-- hair back -->
    <ellipse cx="830" cy="250" rx="75" ry="70" fill="#6366f1"/>
    <!-- face -->
    <ellipse cx="830" cy="265" rx="65" ry="62" fill="#fde68a" stroke="#fbbf24" stroke-width="2"/>
    <!-- blush -->
    <ellipse cx="795" cy="285" rx="14" ry="8" fill="#fda4af" opacity="0.6"/>
    <ellipse cx="865" cy="285" rx="14" ry="8" fill="#fda4af" opacity="0.6"/>
    <!-- eyes (happy curve) -->
    <path d="M808,262 Q815,255 822,262" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
    <path d="M838,262 Q845,255 852,262" fill="none" stroke="#1e1b4b" stroke-width="3" stroke-linecap="round"/>
    <!-- eye shine -->
    <circle cx="812" cy="259" r="2.5" fill="#fff"/>
    <circle cx="842" cy="259" r="2.5" fill="#fff"/>
    <!-- smile -->
    <path d="M815,278 Q830,292 845,278" fill="none" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round"/>
    <!-- hair front bangs -->
    <path d="M765,232 Q775,200 800,215 Q815,205 830,208 Q845,205 860,215 Q885,200 895,232 Q870,220 830,222 Q790,220 765,232Z" fill="#4338ca"/>
    <!-- ahoge (cute hair spike) -->
    <path d="M830,195 Q840,165 848,170 Q844,182 838,190 Q842,182 850,178 Q848,192 838,200Z" fill="#4338ca"/>
    <!-- headphone ear pieces -->
    <ellipse cx="766" cy="268" rx="14" ry="18" fill="#c4b5f4" stroke="#a78bfa" stroke-width="2"/>
    <ellipse cx="894" cy="268" rx="14" ry="18" fill="#c4b5f4" stroke="#a78bfa" stroke-width="2"/>
    <!-- headphone band -->
    <path d="M766,252 Q830,195 894,252" fill="none" stroke="#818cf8" stroke-width="5" stroke-linecap="round"/>
    <!-- headphone inner -->
    <ellipse cx="766" cy="268" rx="8" ry="11" fill="#818cf8"/>
    <ellipse cx="894" cy="268" rx="8" ry="11" fill="#818cf8"/>
  </g>

  <!-- speech bubble -->
  <g filter="url(#drop)" transform="translate(890,150)">
    <rect x="0" y="0" width="130" height="50" rx="16" fill="#fff" stroke="#c4b5f4" stroke-width="2"/>
    <polygon points="20,50 10,68 40,50" fill="#fff" stroke="#c4b5f4" stroke-width="2" stroke-linejoin="round"/>
    <polygon points="20,50 10,66 40,50" fill="#fff"/>
    <text x="65" y="22" text-anchor="middle" font-family="'Segoe UI',system-ui" font-size="11" font-weight="600" fill="#6366f1">Claude Code</text>
    <text x="65" y="38" text-anchor="middle" font-family="'Segoe UI',system-ui" font-size="11" fill="#8b5cf6">で作ってみた！✨</text>
  </g>

  <!-- sparkle decorations around character -->
  <g fill="#fbbf24" opacity="0.9">
    <polygon points="695,310 697,317 704,317 699,321 701,328 695,324 689,328 691,321 686,317 693,317" transform="scale(0.6)"/>
    <polygon points="1000,310 1002,315 1007,315 1004,318 1005,323 1000,320 995,323 996,318 993,315 998,315" transform="scale(0.8)"/>
  </g>
  <text x="700" y="190" font-size="18" opacity="0.7">✨</text>
  <text x="960" y="230" font-size="16" opacity="0.6">⭐</text>
  <text x="675" y="450" font-size="14" opacity="0.5">💫</text>
</svg>
